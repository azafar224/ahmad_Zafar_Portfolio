<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5eead4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)" />

  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" ry="14" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.6" />

  <!-- AZ text -->
  <text
    x="32"
    y="43"
    font-family="'Arial', sans-serif"
    font-size="26"
    font-weight="700"
    text-anchor="middle"
    fill="url(#accent)"
    letter-spacing="-1"
  >AZ</text>
</svg>
